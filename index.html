<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hades - Melanie Martinez</title>
    <!-- Usamos Tailwind por CDN porque es mas rapido de configurar -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Animaciones CSS - No mover estos keyframes */
        @keyframes slideOutUp { 
            0% { transform: translateY(0); opacity: 1; filter: blur(0); } 
            100% { transform: translateY(-100%); opacity: 0; filter: blur(3px); } 
        }
        @keyframes slideInUp { 
            0% { transform: translateY(100%); opacity: 0; filter: blur(3px); } 
            100% { transform: translateY(0); opacity: 1; filter: blur(0); } 
        }
        
        .animate-slideOutUp { animation: slideOutUp 0.4s ease forwards; }
        .animate-slideInUp { animation: slideInUp 0.4s ease forwards; }

        /* Efecto rebote del fondo como el DVD */
        @keyframes bounceX { from { transform: translateX(-3%); } to { transform: translateX(3%); } }
        @keyframes bounceY { from { transform: translateY(-3%) scale(1.15); } to { transform: translateY(3%) scale(1.15); } }
        
        .anim-dvd-x { animation: bounceX 18s linear infinite alternate; }
        .anim-dvd-y { animation: bounceY 14s linear infinite alternate; }

        /* Cenizas flotando */
        @keyframes floatParticulas {
            0% { transform: translateY(100vh) translateX(0) scale(1); opacity: 0; }
            20% { opacity: 0.8; }
            80% { opacity: 0.5; }
            100% { transform: translateY(-20vh) translateX(20px) scale(0.5); opacity: 0; }
        }

        .fade-img { transition: opacity 2s ease-in-out; }
        
        /* Ocultar barra de scroll para que no se vea feo en celular */
        body { background-color: #030303; overflow-x: hidden; touch-action: pan-y; }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen w-full m-0 p-0 font-sans">

    <!-- Contenedor principal del telefono -->
    <div class="w-full max-w-md h-[100dvh] mx-auto flex flex-col bg-[#050505] text-white relative overflow-hidden sm:h-[850px] sm:rounded-[2.5rem] sm:border sm:border-gray-800">
        
        <!-- ==============================
             AVISO DE AUDIO (Arriba)
             ============================== -->
        <div id="aviso-audio" class="absolute top-10 left-0 right-0 flex justify-center z-50 pointer-events-none transition-opacity duration-1000">
            <span class="bg-black/50 text-gray-300 text-[10px] tracking-widest uppercase px-4 py-1 rounded-full backdrop-blur-md border border-gray-600">
                Presiona para escuchar
 snippets --->
            </span>
        </div>

        <!-- Boton para mutear -->
        <button id="btn-mutear" class="absolute top-8 right-6 z-50 w-10 h-10 bg-black/30 backdrop-blur-md rounded-full flex justify-center items-center border border-gray-600 text-gray-400 hover:text-white transition">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4">
                <path id="icono-audio-path" d="M11 5L6 9H2v6h4l5 4V5z M22 9l-6 6 M16 9l6 6"></path>
            </svg>
        </button>

        <!-- ==============================
             FONDOS Y PARTICULAS
             ============================== -->
        <div class="relative flex-1 w-full h-full overflow-hidden bg-black">
            
            <div class="absolute inset-0 w-full h-full anim-dvd-x">
                <div class="absolute inset-0 w-full h-full anim-dvd-y">
                    <img id="imagen-fondo-1" class="absolute inset-0 w-full h-full object-cover fade-img opacity-100 z-0" src="" alt="Fondo 1" />
                    <img id="imagen-fondo-2" class="absolute inset-0 w-full h-full object-cover fade-img opacity-0 z-10" src="" alt="Fondo 2" />
                </div>
            </div>

            <div id="contenedor-particulas" class="absolute inset-0 z-20 pointer-events-none"></div>

            <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,transparent_20%,rgba(0,0,0,0.8)_100%)] z-20"></div>
            <div class="absolute bottom-0 left-0 right-0 h-64 bg-gradient-to-t from-[#0a0a0a] to-transparent z-20"></div>

            <!-- ==============================
                 WIDGET DEL CONTADOR
                 ============================== -->
            <div id="area-swipe" class="absolute bottom-6 left-4 right-4 z-40 flex flex-col items-center gap-3">
                
                <div id="panel-cristal" class="w-full rounded-3xl bg-white/5 backdrop-blur-xl border border-white/10 p-4 flex items-center gap-4 transition-all duration-500">
                    
                    <div id="caja-thumbnail" class="relative w-16 h-16 flex-shrink-0">
                        <div class="absolute inset-0 bg-white/20 blur-md rounded-xl"></div>
                        <img src="./thumbnail.jpg" alt="Miniatura" class="relative w-full h-full object-cover rounded-xl shadow-lg border border-white/20" onerror="this.src='https://images.unsplash.com/photo-1518709268805-4e9042af9f23?q=80&w=200&auto=format&fit=crop';"/>
                    </div>

                    <div id="contenedor-modos" class="flex-1 relative h-[60px] w-full transition-all duration-300">
                        <!-- Vacio, se llena con innerHTML -->
                    </div>

                    <div id="mensaje-salida" class="hidden flex-1 h-[60px] w-full flex-col justify-center items-center">
                        <span class="text-sm font-bold tracking-widest text-white uppercase animate-pulse">¡Ya Disponible!</span>
                        <span class="text-[10px] text-gray-400 mt-1">Hades ha llegado</span>
                    </div>

                </div>

                <div id="puntitos" class="flex gap-2 items-center mt-1">
                    <div class="dot w-1.5 h-1.5 rounded-full bg-white transition"></div>
                    <div class="dot w-1.5 h-1.5 rounded-full bg-gray-500 transition"></div>
                    <div class="dot w-1.5 h-1.5 rounded-full bg-gray-500 transition"></div>
                    <div class="dot w-1.5 h-1.5 rounded-full bg-gray-500 transition"></div>
                </div>
            </div>
        </div>

        <!-- ==============================
             TEXTOS Y BOTON PRESAVE
             ============================== -->
        <div class="h-[180px] bg-gradient-to-b from-[#0a0a0a] to-black flex flex-col justify-center px-8 z-30 shrink-0">
            <h1 class="text-4xl font-normal tracking-wider text-white">
                𝕳𝖆𝖉𝖊𝖘
            </h1>
            <div class="flex justify-between items-end mt-2">
                <h2 class="text-xl font-normal text-gray-400">
                    𝕸𝖊𝖑𝖆𝖓𝖎𝖊 𝕸𝖆𝖗𝖙𝖎𝖓𝖊𝖟
                </h2>
                
                <a href="https://youtube.com/@melaniemartinez?si=j6hhG7-qftZWh6rt" target="_blank" class="px-4 py-2 rounded-full bg-white/10 border border-white/20 hover:bg-white/20 transition flex items-center gap-2">
                    <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.587 14.424c-.177.292-.55.385-.843.208-2.31-1.41-5.22-1.73-8.654-.95-.333.076-.66-.134-.736-.467-.076-.333.134-.66.467-.736 3.755-.85 6.96-.484 9.558 1.103.293.178.385.55.208.842zm1.2-3.195c-.22.36-.69.48-1.05.26-2.65-1.63-6.72-2.11-9.98-1.15-.41.12-.84-.11-.96-.52-.12-.41.11-.84.52-.96 3.73-1.09 8.28-.54 11.31 1.32.36.22.48.69.26 1.05zm.14-3.38c-3.18-1.89-8.43-2.07-11.46-1.14-.49.15-.99-.13-1.14-.62-.15-.49.13-.99.62-1.14 3.52-1.08 9.35-.87 13.06 1.33.44.26.58.84.32 1.28-.26.44-.84.58-1.28.32z"/>
                    </svg>
                    <span id="texto-boton" class="text-[10px] font-bold text-white uppercase">Pre-Save</span>
                </a>
            </div>
        </div>

    </div>

    <!-- JAVASCRIPT -->
    <script>
        console.log("Iniciando aplicación del contador global...");

        // ==========================================
        // 1. REPRODUCTOR DE MÚSICA
        // ==========================================
        let cancionFondo = new Audio('./audio1.mp3');
        cancionFondo.volume = 0.25; 
        cancionFondo.loop = true; 
        
        let estaReproduciendo = false;
        let yaTocoPantalla = false;

        cancionFondo.onloadedmetadata = function() {
            let duracionTotal = cancionFondo.duration;
            let segundoAleatorio = Math.random() * duracionTotal;
            cancionFondo.currentTime = segundoAleatorio;
        };

        const avisoTexto = document.getElementById('aviso-audio');
        const btnMutear = document.getElementById('btn-mutear');
        const iconoPath = document.getElementById('icono-audio-path');

        const iconoSinSonido = "M11 5L6 9H2v6h4l5 4V5z M22 9l-6 6 M16 9l6 6";
        const iconoConSonido = "M11 5L6 9H2v6h4l5 4V5z M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07";

        function iniciarMusica(evento) {
            if (evento && evento.target.closest('#btn-mutear')) return;

            if (yaTocoPantalla == false) {
                yaTocoPantalla = true;
                if(avisoTexto) avisoTexto.style.opacity = "0"; 
                
                let prom = cancionFondo.play();
                if (prom !== undefined) {
                    prom.then(() => {
                        estaReproduciendo = true;
                        iconoPath.setAttribute('d', iconoConSonido);
                    }).catch(err => console.log("Esperando click we"));
                }
            }
        }

        document.body.addEventListener('click', iniciarMusica, { once: true });
        document.body.addEventListener('touchstart', iniciarMusica, { once: true });

        btnMutear.addEventListener('click', function(e) {
            e.stopPropagation(); 
            if(yaTocoPantalla == false) {
                iniciarMusica();
                return;
            }
            
            if (estaReproduciendo == true) {
                cancionFondo.pause();
                estaReproduciendo = false;
                iconoPath.setAttribute('d', iconoSinSonido);
            } else {
                cancionFondo.play();
                estaReproduciendo = true;
                iconoPath.setAttribute('d', iconoConSonido);
            }
        });

        // ==========================================
        // 2. PARTICULAS FLOTANTES
        // ==========================================
        function generarCenizas() {
            const divParticulas = document.getElementById('contenedor-particulas');
            let cuantas = 25; 

            for (let i = 0; i < cuantas; i++) {
                let p = document.createElement('div');
                p.className = 'absolute bg-[#ffeedd] rounded-full mix-blend-screen';
                let tamaño = (Math.random() * 3) + 1; 
                p.style.width = tamaño + 'px';
                p.style.height = tamaño + 'px';
                p.style.left = (Math.random() * 100) + '%';
                let tiempoAnimacion = (Math.random() * 5) + 6; 
                let retraso = Math.random() * 10;
                p.style.animation = `floatParticulas ${tiempoAnimacion}s linear infinite`;
                p.style.animationDelay = `-${retraso}s`; 
                divParticulas.appendChild(p);
            }
        }
        generarCenizas();

        // ==========================================
        // 3. CARRUSEL DE IMAGENES
        // ==========================================
        let fotos = [
            './cover1.jpg', './cover2.jpg', './cover3.jpg', './cover4.jpg', './cover5.jpg',
            './cover6.jpg', './cover7.jpg', './cover8.jpg', './cover9.jpg', './cover10.jpg',
            './40730.jpg'
        ];
        
        let fotosQuesiSirven = [];
        let imagenesCargadas = 0;
        let indiceFoto = 0;
        let imagenActiva = 1;

        const htmlImg1 = document.getElementById('imagen-fondo-1');
        const htmlImg2 = document.getElementById('imagen-fondo-2');

        for(let i=0; i < fotos.length; i++) {
            let imgTemporal = new Image();
            imgTemporal.src = fotos[i];
            imgTemporal.onload = function() { fotosQuesiSirven.push(fotos[i]); revisarCarga(); };
            imgTemporal.onerror = function() { revisarCarga(); };
        }

        function revisarCarga() {
            imagenesCargadas = imagenesCargadas + 1;
            if (imagenesCargadas == fotos.length && fotosQuesiSirven.length > 0) {
                htmlImg1.src = fotosQuesiSirven[0];
                if(fotosQuesiSirven.length > 1) setInterval(cambiarFondo, 6500); 
            }
        }

        function cambiarFondo() {
            if (fotosQuesiSirven.length <= 1) return; 
            
            let siguienteIndice = (indiceFoto + 1) % fotosQuesiSirven.length;
            let srcSiguiente = fotosQuesiSirven[siguienteIndice];

            let preload = new Image();
            preload.src = srcSiguiente;
            preload.onload = function() {
                indiceFoto = siguienteIndice;
                if (imagenActiva === 1) {
                    htmlImg2.src = srcSiguiente;
                    htmlImg2.classList.remove('opacity-0'); htmlImg2.classList.add('opacity-100', 'z-10');
                    htmlImg1.classList.remove('opacity-100', 'z-10'); htmlImg1.classList.add('opacity-0', 'z-0');
                    imagenActiva = 2;
                } else {
                    htmlImg1.src = srcSiguiente;
                    htmlImg1.classList.remove('opacity-0'); htmlImg1.classList.add('opacity-100', 'z-10');
                    htmlImg2.classList.remove('opacity-100', 'z-10'); htmlImg2.classList.add('opacity-0', 'z-0');
                    imagenActiva = 1;
                }
            };
        }

        // ==========================================
        // 4. LOGICA DEL SWIPE Y MODOS (El Widget)
        // ==========================================
        let modoActual = 0; 
        let yaSalioElAlbum = false; 
        const contenedorModos = document.getElementById('contenedor-modos');
        const puntitosDiv = document.querySelectorAll('.dot');
        let valoresViejos = {}; 
        
        let plantillas = {
            0: `
                <div class="flex justify-between items-center h-full w-full absolute inset-0">
                    <div class="flex flex-col items-center flex-1">
                        <div id="box-days" class="relative h-10 w-full overflow-hidden flex justify-center items-center"></div>
                        <span class="text-[9px] uppercase tracking-widest text-gray-400 font-semibold">Días</span>
                    </div>
                    <div class="w-px h-6 bg-white/20"></div>
                    <div class="flex flex-col items-center flex-1">
                        <div id="box-hours" class="relative h-10 w-full overflow-hidden flex justify-center items-center"></div>
                        <span class="text-[9px] uppercase tracking-widest text-gray-400 font-semibold">Horas</span>
                    </div>
                    <div class="w-px h-6 bg-white/20"></div>
                    <div class="flex flex-col items-center flex-1">
                        <div id="box-mins" class="relative h-10 w-full overflow-hidden flex justify-center items-center"></div>
                        <span class="text-[9px] uppercase tracking-widest text-gray-400 font-semibold">Mins</span>
                    </div>
                    <div class="w-px h-6 bg-white/20"></div>
                    <div class="flex flex-col items-center flex-1">
                        <div id="box-secs" class="relative h-10 w-full overflow-hidden flex justify-center items-center"></div>
                        <span class="text-[9px] uppercase tracking-widest text-gray-400 font-semibold">Segs</span>
                    </div>
                </div>
            `,
            1: `
                <div class="flex justify-around items-center h-full w-full absolute inset-0 px-4">
                    <div class="flex flex-col items-center">
                        <div id="box-days-only" class="relative h-10 w-16 overflow-hidden flex justify-center items-center"></div>
                        <span class="text-[10px] uppercase tracking-widest text-gray-400">Días</span>
                    </div>
                    <div class="w-px h-8 bg-white/20"></div>
                    <div class="flex flex-col items-center">
                        <div id="box-hours-only" class="relative h-10 w-16 overflow-hidden flex justify-center items-center"></div>
                        <span class="text-[10px] uppercase tracking-widest text-gray-400">Horas</span>
                    </div>
                </div>
            `,
            2: `
                <div class="flex justify-around items-center h-full w-full absolute inset-0 px-2">
                    <div class="flex flex-col items-center">
                        <div id="box-total-hours" class="relative h-10 w-20 overflow-hidden flex justify-center items-center"></div>
                        <span class="text-[9px] uppercase tracking-widest text-gray-400 text-center">Horas<br>Totales</span>
                    </div>
                    <div class="w-px h-8 bg-white/20"></div>
                    <div class="flex flex-col items-center">
                        <div id="box-rem-mins" class="relative h-10 w-16 overflow-hidden flex justify-center items-center"></div>
                        <span class="text-[9px] uppercase tracking-widest text-gray-400 text-center">Mins<br>Actuales</span>
                    </div>
                </div>
            `,
            3: `
                <div class="flex justify-center items-center h-full w-full absolute inset-0">
                    <div class="flex items-center gap-2">
                        <span class="text-xs font-bold tracking-widest text-gray-400 uppercase">¡Quedan</span>
                        <div id="box-final-days" class="relative h-10 w-14 overflow-hidden flex justify-center items-center"></div>
                        <span class="text-xs font-bold tracking-widest text-gray-400 uppercase">Días!</span>
                    </div>
                </div>
            `
        };

        function renderizarModo() {
            if(yaSalioElAlbum) return; 

            contenedorModos.style.opacity = "0"; 
            
            setTimeout(function() {
                contenedorModos.innerHTML = plantillas[modoActual];
                valoresViejos = {}; 
                hacerCalculoReloj(); 
                contenedorModos.style.opacity = "1";
                
                for(let k=0; k < puntitosDiv.length; k++) {
                    if(k === modoActual) {
                        puntitosDiv[k].className = "dot w-1.5 h-1.5 rounded-full bg-white transition";
                    } else {
                        puntitosDiv[k].className = "dot w-1.5 h-1.5 rounded-full bg-gray-500 transition";
                    }
                }
            }, 200);
        }

        let inicioX = 0;
        let finX = 0;
        let areaSwipe = document.getElementById('area-swipe');

        areaSwipe.addEventListener('touchstart', function(e) { inicioX = e.touches[0].clientX; }, {passive: true});
        areaSwipe.addEventListener('touchend', function(e) { finX = e.changedTouches[0].clientX; checarSiHizoSwipe(); }, {passive: true});

        let mouseApretado = false;
        areaSwipe.addEventListener('mousedown', function(e) { mouseApretado = true; inicioX = e.clientX; });
        window.addEventListener('mouseup', function(e) { 
            if(mouseApretado == true) { finX = e.clientX; checarSiHizoSwipe(); mouseApretado = false; }
        });

        function checarSiHizoSwipe() {
            if(yaSalioElAlbum) return; 
            
            let distancia = inicioX - finX;
            if (distancia > 40) {
                modoActual = modoActual + 1;
                if(modoActual > 3) modoActual = 0;
                renderizarModo();
            } else if (distancia < -40) {
                modoActual = modoActual - 1;
                if(modoActual < 0) modoActual = 3;
                renderizarModo();
            }
        }

        // ==========================================
        // 5. FECHA GLOBAL DE LANZAMIENTO (NUEVO)
        // ==========================================
        function ponerNumero(idCaja, nuevoValor, clasesTexto = "text-2xl font-bold") {
            let caja = document.getElementById(idCaja);
            if (!caja) return; 
            if (valoresViejos[idCaja] === nuevoValor) return; 

            let textoAMostrar = nuevoValor;
            if(nuevoValor < 10) { textoAMostrar = "0" + nuevoValor; }
            
            let baseStyle = "absolute tabular-nums text-white drop-shadow-md " + clasesTexto;

            let elementosViejos = caja.querySelectorAll('span:not(.borrando)');
            
            for(let i=0; i < elementosViejos.length; i++) {
                let viejo = elementosViejos[i];
                viejo.classList.add('borrando'); 
                viejo.className = baseStyle + " animate-slideOutUp borrando";
                
                setTimeout(() => {
                    if (caja.contains(viejo)) {
                        caja.removeChild(viejo);
                    }
                }, 400);
            }

            let nuevoElemento = document.createElement('span');
            nuevoElemento.className = baseStyle + " animate-slideInUp";
            nuevoElemento.innerText = textoAMostrar;
            
            caja.appendChild(nuevoElemento);
            valoresViejos[idCaja] = nuevoValor;
        }

        // ESTA ES LA MAGIA GLOBAL
        function calcularFechaGlobal() {
            // El formato es: Año-Mes-Dia T Hora:Min:Seg Z
            // La letra 'Z' significa que es horario UTC (Universal). 
            // Las 04:00:00 Z equivalen EXACTAMENTE a las 10PM de México o 12AM de USA EST o 5AM de España.
            // Si el lanzamiento del flyer es en OTRO MES, solo cambia el "03-27" por el mes correcto (ej. "05-27" para Mayo)
            let fechaLanzamiento = new Date("2026-03-27T04:00:00Z");
            return fechaLanzamiento.getTime();
        }

        let fechaObjetivo = calcularFechaGlobal();
        let loopReloj;

        function hacerCalculoReloj() {
            if(yaSalioElAlbum) return;

            // new Date().getTime() siempre va a sacar la hora que tiene el cel del usuario
            let ahorita = new Date().getTime();
            let faltan = fechaObjetivo - ahorita;

            // Cuando llegamos al lanzamiento global
            if (faltan <= 0) {
                yaSalioElAlbum = true;
                clearInterval(loopReloj); 
                
                document.getElementById('contenedor-modos').style.display = 'none';
                document.getElementById('puntitos').style.display = 'none';
                document.getElementById('caja-thumbnail').style.display = 'none';
                
                let msg = document.getElementById('mensaje-salida');
                msg.classList.remove('hidden');
                msg.classList.add('flex');

                let textoBtn = document.getElementById('texto-boton');
                if (textoBtn) textoBtn.innerText = "ESCUCHAR AHORA";
                
                let panel = document.getElementById('panel-cristal');
                panel.classList.remove('gap-4');
                panel.classList.add('justify-center');
                
                return; 
            }

            let dias = Math.floor(faltan / (1000 * 60 * 60 * 24));
            let horas_totales = Math.floor(faltan / (1000 * 60 * 60));
            let horas = Math.floor((faltan % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            let minutos = Math.floor((faltan % (1000 * 60 * 60)) / (1000 * 60));
            let segundos = Math.floor((faltan % (1000 * 60)) / 1000);

            if(modoActual == 0) {
                ponerNumero('box-days', dias);
                ponerNumero('box-hours', horas);
                ponerNumero('box-mins', minutos);
                ponerNumero('box-secs', segundos);
            } 
            else if (modoActual == 1) {
                ponerNumero('box-days-only', dias, "text-3xl");
                ponerNumero('box-hours-only', horas, "text-3xl");
            } 
            else if (modoActual == 2) {
                ponerNumero('box-total-hours', horas_totales, "text-3xl");
                ponerNumero('box-rem-mins', minutos, "text-3xl");
            } 
            else if (modoActual == 3) {
                ponerNumero('box-final-days', dias, "text-3xl");
            }
        }

        renderizarModo();
        loopReloj = setInterval(hacerCalculoReloj, 1000); 

    </script>
</body>
</html>
