<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Contador Hades</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Animaciones para los números rodantes */
        @keyframes slideOutUp {
            from { transform: translateY(0); opacity: 1; filter: blur(0); }
            to { transform: translateY(-100%); opacity: 0; filter: blur(3px); }
        }
        @keyframes slideInUp {
            from { transform: translateY(100%); opacity: 0; filter: blur(3px); }
            to { transform: translateY(0); opacity: 1; filter: blur(0); }
        }
        .animate-slideOutUp { animation: slideOutUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        .animate-slideInUp { animation: slideInUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

        /* Animaciones estilo DVD */
        @keyframes bounceX { 0% { transform: translateX(-4%); } 100% { transform: translateX(4%); } }
        @keyframes bounceY { 0% { transform: translateY(-4%) scale(1.2); } 100% { transform: translateY(4%) scale(1.2); } }
        .animate-dvd-x { animation: bounceX 16s linear infinite alternate; }
        .animate-dvd-y { animation: bounceY 13s linear infinite alternate; }

        /* Transiciones de interfaz */
        .fade-transition { transition: opacity 2s ease-in-out; }
        .ui-transition { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        
        body { background-color: #030303; touch-action: pan-y; }

        /* Esconder scrollbar pero permitir swipe */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen w-full m-0 p-0 font-sans selection:bg-white/20">

    <div class="w-full max-w-md h-[100dvh] mx-auto flex flex-col bg-[#050505] text-white relative overflow-hidden sm:h-[850px] sm:rounded-[2.5rem] sm:border sm:border-white/10 sm:shadow-[0_0_50px_rgba(0,0,0,0.8)]">
        
        <!-- SECCIÓN SUPERIOR: Fondos dinámicos -->
        <div class="relative flex-1 w-full h-full overflow-hidden bg-black">
            
            <!-- CAPA DE REBOTE DVD Y ZOOM -->
            <div class="absolute inset-0 w-full h-full animate-dvd-x">
                <div class="absolute inset-0 w-full h-full animate-dvd-y">
                    <img id="bg-img-1" class="absolute inset-0 w-full h-full object-cover fade-transition opacity-100 z-0" src="" alt="Fondo 1" />
                    <img id="bg-img-2" class="absolute inset-0 w-full h-full object-cover fade-transition opacity-0 z-10" src="" alt="Fondo 2" />
                </div>
            </div>

            <!-- Viñeta cinematográfica (Bordes oscurecidos) -->
            <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,transparent_20%,rgba(0,0,0,0.7)_100%)] pointer-events-none z-20"></div>
            
            <!-- Degradado inferior fundido con el fondo -->
            <div class="absolute bottom-0 left-0 right-0 h-56 bg-gradient-to-t from-[#0a0a0a] via-[#0a0a0a]/90 to-transparent pointer-events-none z-20"></div>

            <!-- CONTENEDOR INTERACTIVO DEL CONTADOR -->
            <div id="swipe-area" class="absolute bottom-10 left-4 right-4 z-30 flex flex-col items-center gap-3 cursor-grab active:cursor-grabbing">
                
                <div class="w-full rounded-[2rem] bg-gradient-to-br from-white/[0.08] to-white/[0.01] backdrop-blur-2xl border border-white/10 shadow-[0_8px_32px_rgba(0,0,0,0.6)] p-4 flex items-center gap-4 ring-1 ring-white/5 relative overflow-hidden">
                    
                    <div class="absolute top-0 left-1/4 w-1/2 h-px bg-gradient-to-r from-transparent via-white/30 to-transparent"></div>

                    <!-- Imagen en miniatura (Thumbnail) -->
                    <div class="relative w-16 h-16 flex-shrink-0">
                        <div class="absolute inset-0 bg-white/20 blur-md rounded-2xl"></div>
                        <div class="relative w-full h-full rounded-2xl overflow-hidden shadow-2xl border border-white/20">
                            <!-- Siempre mantengo la imagen de fallback visual en caso de fallo como solicitaste -->
                            <img src="./thumbnail.jpg" alt="Miniatura" class="w-full h-full object-cover bg-[#1a1a1a] hover:scale-110 transition-transform duration-700" onerror="this.onerror=null; this.src='https://images.unsplash.com/photo-1518709268805-4e9042af9f23?q=80&w=200&auto=format&fit=crop';"/>
                        </div>
                    </div>

                    <!-- ÁREA DE CONTENIDO DINÁMICO (Cambia con el swipe) -->
                    <div id="modes-container" class="flex-1 relative h-[60px] w-full ui-transition">
                        <!-- El contenido se inyecta desde JavaScript -->
                    </div>
                </div>

                <!-- Puntos indicadores de páginas (Dots) -->
                <div class="flex gap-2 items-center mt-1">
                    <div class="nav-dot w-1.5 h-1.5 rounded-full bg-white transition-all duration-300"></div>
                    <div class="nav-dot w-1.5 h-1.5 rounded-full bg-white/30 transition-all duration-300"></div>
                    <div class="nav-dot w-1.5 h-1.5 rounded-full bg-white/30 transition-all duration-300"></div>
                    <div class="nav-dot w-1.5 h-1.5 rounded-full bg-white/30 transition-all duration-300"></div>
                </div>
            </div>
        </div>

        <!-- SECCIÓN INFERIOR: Títulos -->
        <div class="h-[150px] bg-gradient-to-b from-[#0a0a0a] to-black flex flex-col justify-center px-8 sm:px-10 z-30 relative shrink-0">
            <h1 class="text-4xl sm:text-5xl font-normal tracking-wider text-white drop-shadow-[0_0_20px_rgba(255,255,255,0.25)]">
                𝕳𝖆𝖉𝖊𝖘
            </h1>
            <h2 class="text-lg sm:text-xl font-normal tracking-[0.15em] text-white/50 mt-2 drop-shadow-md">
                𝕸𝖊𝖑𝖆𝖓𝖎𝖊 𝕸𝖆𝖗𝖙𝖎𝖓𝖊𝖟
            </h2>
        </div>

    </div>

    <script>
        // ==========================================
        // SISTEMA INTELIGENTE DE IMÁGENES
        // ==========================================
        const potentialCovers = [
            './cover1.jpg', './cover2.jpg', './cover3.jpg', './cover4.jpg', './cover5.jpg',
            './cover6.jpg', './cover7.jpg', './cover8.jpg', './cover9.jpg', './cover10.jpg',
            './40730.jpg'
        ];
        
        let availableCovers = [];
        let loadedCount = 0;
        let currentCoverIndex = 0;
        let activeImgEl = 1;

        const img1 = document.getElementById('bg-img-1');
        const img2 = document.getElementById('bg-img-2');

        potentialCovers.forEach(src => {
            const tempImg = new Image();
            tempImg.src = src;
            tempImg.onload = () => { availableCovers.push(src); checkAllLoaded(); };
            tempImg.onerror = () => { checkAllLoaded(); };
        });

        function checkAllLoaded() {
            loadedCount++;
            if (loadedCount === potentialCovers.length && availableCovers.length > 0) {
                img1.src = availableCovers[0];
                if(availableCovers.length > 1) setInterval(changeCover, 6500);
            }
        }

        function changeCover() {
            if (availableCovers.length <= 1) return;

            const nextIndex = (currentCoverIndex + 1) % availableCovers.length;
            const nextSrc = availableCovers[nextIndex];

            const preloader = new Image();
            preloader.src = nextSrc;
            preloader.onload = () => {
                currentCoverIndex = nextIndex;
                if (activeImgEl === 1) {
                    img2.src = nextSrc;
                    img2.classList.remove('opacity-0'); img2.classList.add('opacity-100', 'z-10');
                    img1.classList.remove('opacity-100', 'z-10'); img1.classList.add('opacity-0', 'z-0');
                    activeImgEl = 2;
                } else {
                    img1.src = nextSrc;
                    img1.classList.remove('opacity-0'); img1.classList.add('opacity-100', 'z-10');
                    img2.classList.remove('opacity-100', 'z-10'); img2.classList.add('opacity-0', 'z-0');
                    activeImgEl = 1;
                }
            };
        }

        // ==========================================
        // GESTIÓN DE MODOS (SWIPE)
        // ==========================================
        let currentMode = 0; 
        const totalModes = 4;
        const modesContainer = document.getElementById('modes-container');
        const dots = document.querySelectorAll('.nav-dot');
        let prevValues = {}; 
        
        const modeTemplates = {
            0: `
                <div class="flex justify-between items-center h-full w-full absolute inset-0">
                    <div class="flex flex-col items-center flex-1">
                        <div id="v-days" class="relative h-10 w-full overflow-hidden flex justify-center items-center"></div>
                        <span class="text-[9px] uppercase tracking-[0.2em] text-white/40 font-semibold">Días</span>
                    </div>
                    <div class="w-[1px] h-6 bg-white/20 rounded-full"></div>
                    <div class="flex flex-col items-center flex-1">
                        <div id="v-hours" class="relative h-10 w-full overflow-hidden flex justify-center items-center"></div>
                        <span class="text-[9px] uppercase tracking-[0.2em] text-white/40 font-semibold">Horas</span>
                    </div>
                    <div class="w-[1px] h-6 bg-white/20 rounded-full"></div>
                    <div class="flex flex-col items-center flex-1">
                        <div id="v-mins" class="relative h-10 w-full overflow-hidden flex justify-center items-center"></div>
                        <span class="text-[9px] uppercase tracking-[0.2em] text-white/40 font-semibold">Mins</span>
                    </div>
                    <div class="w-[1px] h-6 bg-white/20 rounded-full"></div>
                    <div class="flex flex-col items-center flex-1">
                        <div id="v-secs" class="relative h-10 w-full overflow-hidden flex justify-center items-center"></div>
                        <span class="text-[9px] uppercase tracking-[0.2em] text-white/40 font-semibold">Segs</span>
                    </div>
                </div>
            `,
            1: `
                <div class="flex justify-around items-center h-full w-full absolute inset-0 px-4">
                    <div class="flex flex-col items-center">
                        <div id="v-days-only" class="relative h-10 w-16 overflow-hidden flex justify-center items-center"></div>
                        <span class="text-[10px] uppercase tracking-[0.2em] text-white/40 font-semibold">Días</span>
                    </div>
                    <div class="w-[1px] h-8 bg-white/20 rounded-full"></div>
                    <div class="flex flex-col items-center">
                        <div id="v-hours-only" class="relative h-10 w-16 overflow-hidden flex justify-center items-center"></div>
                        <span class="text-[10px] uppercase tracking-[0.2em] text-white/40 font-semibold">Horas</span>
                    </div>
                </div>
            `,
            2: `
                <div class="flex justify-around items-center h-full w-full absolute inset-0 px-2">
                    <div class="flex flex-col items-center">
                        <div id="v-total-hours" class="relative h-10 w-20 overflow-hidden flex justify-center items-center"></div>
                        <span class="text-[9px] uppercase tracking-[0.1em] text-white/40 font-semibold text-center leading-tight">Horas<br>Totales</span>
                    </div>
                    <div class="w-[1px] h-8 bg-white/20 rounded-full"></div>
                    <div class="flex flex-col items-center">
                        <div id="v-rem-mins" class="relative h-10 w-16 overflow-hidden flex justify-center items-center"></div>
                        <span class="text-[9px] uppercase tracking-[0.1em] text-white/40 font-semibold text-center leading-tight">Mins<br>Actuales</span>
                    </div>
                </div>
            `,
            3: `
                <div class="flex justify-center items-center h-full w-full absolute inset-0">
                    <div class="flex items-center gap-2 sm:gap-3">
                        <span class="text-[10px] sm:text-xs font-bold tracking-[0.2em] text-white/60 uppercase">¡Quedan</span>
                        <div id="v-final-days" class="relative h-10 sm:h-12 w-14 overflow-hidden flex justify-center items-center"></div>
                        <span class="text-[10px] sm:text-xs font-bold tracking-[0.2em] text-white/60 uppercase">Días!</span>
                    </div>
                </div>
            `
        };

        function renderMode() {
            modesContainer.style.opacity = 0; 
            
            setTimeout(() => {
                modesContainer.innerHTML = modeTemplates[currentMode];
                prevValues = {}; 
                forceUpdate(); 
                modesContainer.style.opacity = 1;
                
                dots.forEach((dot, index) => {
                    if(index === currentMode) {
                        dot.classList.remove('bg-white/30'); dot.classList.add('bg-white');
                    } else {
                        dot.classList.remove('bg-white'); dot.classList.add('bg-white/30');
                    }
                });
            }, 200);
        }

        let touchStartX = 0;
        let touchEndX = 0;
        const swipeArea = document.getElementById('swipe-area');

        swipeArea.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, {passive: true});
        swipeArea.addEventListener('touchend', e => { touchEndX = e.changedTouches[0].screenX; handleSwipe(); }, {passive: true});

        let isDragging = false;
        swipeArea.addEventListener('mousedown', e => { isDragging = true; touchStartX = e.screenX; });
        window.addEventListener('mouseup', e => { if(isDragging) { touchEndX = e.screenX; handleSwipe(); isDragging = false; }});

        function handleSwipe() {
            const threshold = 40; 
            if (touchStartX - touchEndX > threshold) {
                currentMode = (currentMode + 1) % totalModes;
                renderMode();
            } else if (touchEndX - touchStartX > threshold) {
                currentMode = (currentMode - 1 + totalModes) % totalModes;
                renderMode();
            }
        }

        function animateNumber(id, newValue, sizeClass = "text-2xl sm:text-[1.7rem]") {
            const container = document.getElementById(id);
            if (!container) return; 
            
            if (prevValues[id] === newValue) return;

            const displayValue = newValue.toString().padStart(2, '0');
            const baseClasses = `current-value absolute ${sizeClass} font-bold tracking-tight tabular-nums text-white drop-shadow-md`;

            const oldElement = container.querySelector('.current-value');
            if (oldElement) {
                oldElement.classList.remove('animate-slideInUp');
                oldElement.classList.add('animate-slideOutUp');
                setTimeout(() => {
                    if (container.contains(oldElement)) container.removeChild(oldElement);
                }, 400);
            }

            const newElement = document.createElement('span');
            newElement.className = `${baseClasses} animate-slideInUp`;
            newElement.textContent = displayValue;
            
            if (prevValues[id] === undefined) newElement.className = baseClasses;

            container.appendChild(newElement);
            prevValues[id] = newValue;
        }

        // ==========================================
        // CÁLCULO DE HORA LOCAL GLOBAL
        // ==========================================
        function getNextFridayMidnight() {
            // "new Date()" SIEMPRE obtiene la hora local del dispositivo de quien abre la página.
            // Si alguien abre esto en España, será su zona horaria. Si lo abren en México, será la de México.
            const localNow = new Date(); 
            
            // Calculamos cuántos días faltan para el viernes (5)
            let daysUntilFriday = 5 - localNow.getDay();
            
            // Si ya es viernes o sábado, que el contador apunte al próximo viernes
            if (daysUntilFriday <= 0) daysUntilFriday += 7;
            
            // Creamos la fecha objetivo a las 00:00:00 (12:00 a.m.) en la zona horaria LOCAL
            const nextFridayLocal = new Date(
                localNow.getFullYear(), 
                localNow.getMonth(), 
                localNow.getDate() + daysUntilFriday
            );
            
            nextFridayLocal.setHours(0, 0, 0, 0); // Esto fija la medianoche exacta en el país del usuario
            return nextFridayLocal.getTime();
        }

        let targetDate = getNextFridayMidnight();

        function forceUpdate() {
            const now = new Date().getTime();
            let distance = targetDate - now;

            // Reinicia el contador si ya llegó a cero (es decir, ya es viernes)
            if (distance <= 0) {
                targetDate = getNextFridayMidnight();
                distance = targetDate - now;
            }

            const totalDays = Math.floor(distance / (1000 * 60 * 60 * 24));
            const totalHours = Math.floor(distance / (1000 * 60 * 60));
            const remHours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const remMinutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const remSeconds = Math.floor((distance % (1000 * 60)) / 1000);

            if(currentMode === 0) {
                animateNumber('v-days', totalDays);
                animateNumber('v-hours', remHours);
                animateNumber('v-mins', remMinutes);
                animateNumber('v-secs', remSeconds);
            } else if (currentMode === 1) {
                animateNumber('v-days-only', totalDays, "text-3xl");
                animateNumber('v-hours-only', remHours, "text-3xl");
            } else if (currentMode === 2) {
                animateNumber('v-total-hours', totalHours, "text-3xl");
                animateNumber('v-rem-mins', remMinutes, "text-3xl");
            } else if (currentMode === 3) {
                animateNumber('v-final-days', totalDays, "text-3xl sm:text-[2rem] text-white");
            }
        }

        renderMode();
        setInterval(forceUpdate, 1000);
    </script>
</body>
</html>
